name: Scorecard

# Org reusable OpenSSF Scorecard gate (SHA-pinned caller). Wave G CI parity.
# branch_protection_rule trigger intentionally omitted (see reusable note).
on:
  push:
    branches: [main]
  schedule:
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scorecard:
    permissions:
      security-events: write
      id-token: write
    uses: szl-holdings/.github/.github/workflows/reusable-scorecard.yml@ebd2128c691b850c84438b671fbb512945933776
    secrets: inherit
